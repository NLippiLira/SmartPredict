<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SmartPredict</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

<div class="container">
    <h1>🚀 SmartPredict</h1>
    <p>Predicción de aprobación crediticia</p>

    <div class="card">
        <form id="form">
            <input type="number" id="edad" placeholder="Edad" required>
            <input type="number" id="ingresos" placeholder="Ingresos" required>
            <input type="number" id="score" placeholder="Score crediticio" required>

            <button type="submit">Predecir</button>
        </form>

        <div id="resultado"></div>
    </div>
</div>

<!-- JS -->
<script src="./app.js"></script>

</body>
</html>
